<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Responsive Image Gallery</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
      }

      .gallery img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 12px;
        transition:
          transform 0.4s,
          box-shadow 0.4s;
      }

      .gallery img:hover {
        transform: scale(1.07);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      .title {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">My Gallery</a>
      </div>
    </nav>

    <!-- Heading -->
    <div class="container text-center mt-4">
      <h1 class="title">Nature Gallery</h1>
      <p class="text-muted">Responsive Image Gallery using Bootstrap Grid</p>
    </div>

    <!-- Gallery -->
    <div class="container gallery mt-4">
      <div class="row g-4">
        <!-- Image 1 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
          <img src="images/nature.jpg" />
          <p class="text-center mt-2">Mountain</p>
        </div>

        <!-- Image 2 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
          <img src="images/photo-1448375240586-882707db888b.jpg" />
          <p class="text-center mt-2">Forest</p>
        </div>

        <!-- Image 3 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
          <img src="images/photo-1476610182048-b716b8518aae.jpg" />
          <p class="text-center mt-2">River</p>
        </div>

        <!-- Image 4 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
          <img src="images/photo-1505118380757-91f5f5632de0.jpg" />
          <p class="text-center mt-2">Sunset</p>
        </div>

        <!-- Image 5 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
          <img src="images/photo-1505881402582-c5bc11054f91.jpg" />
          <p class="text-center mt-2">Beach</p>
        </div>

        <!-- Image 6 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
          <img src="images/photo-1506905925346-21bda4d32df4.jpg" />
          <p class="text-center mt-2">Waterfall</p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center mt-5 p-3">
      <p>© 2026 Image Gallery Project | Xavier University Patna</p>
    </footer>
  </body>
</html>
